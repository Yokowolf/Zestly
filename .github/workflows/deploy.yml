# Compila la app React (web/) y la publica en GitHub Pages
name: Deploy Zestly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages a veces responde "Deployment failed, try again later" (error
      # transitorio del servicio) — se reintenta hasta 2 veces antes de fallar
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry1
        if: steps.deployment.outcome == 'failure'
        name: Reintento 1 (fallo transitorio de Pages)
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry2
        if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        name: Reintento 2 (fallo transitorio de Pages)
        uses: actions/deploy-pages@v4
